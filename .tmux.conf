set-option -gw xterm-keys on

# set Zsh as your default Tmux shell
set-option -g default-shell /bin/zsh

# Tmux should be pretty, we need 256 color for that
# set -g default-terminal "screen-256color"
set-option -g mouse on
set-option -g set-clipboard on
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xsel -i --clipboard"

# Tmux uses a 'control key', let's set it to 'Ctrl-a'
# Reason: 'Ctrl-a' is easier to reach than 'Ctrl-b'
# set -g prefix C-a
# unbind C-b

# command delay? We don't want that, make it short
set -sg escape-time 1

# Set the numbering of windows to go from 1 instead
# of 0 - silly programmers :|
# set-option -g base-index 1
# setw -g pane-base-index 1


# Allow us to reload our Tmux configuration while
# using Tmux
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Getting interesting now, we use the vertical and horizontal
# symbols to split the screen
# bind | split-window -h
# bind - split-window -v

set-environment -g TMUX_PLUGIN_MANAGER_PATH '$HOME/.local/plugins/tmux'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
#set -g @plugin 'tmux-plugins/tmux-yank'

# Plugin variables
set -g @resurrect-dir '$HOME/.local/var/tmux/resurrect-sessions'
set -g @resurrect-processes '~perldoc'

run '$HOME/.local/plugins/tmux/tpm/tpm'
